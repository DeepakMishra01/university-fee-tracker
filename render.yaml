databases:
  - name: university-fees-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: university-fee-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: university-fees-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.4
